name: "Apple Build"
description: "Build the C++ library on MacOS. Produces artifact build-apple-clang-$version-$config."
inputs:
  config:
    description: "Configuration to build (Release or Debug, see CMAKE_BUILD_TYPE)"
    required: true
    default: "Release"
  version:
    description: "Version of the compiler to use (min or latest)."
    required: true
    default: "latest"
runs:
  using: "composite"
