    #       if [[ "${{ inputs.version }}" == "min" ]]; then
    #         sudo apt-get -qq -y install gcc-11
    #         sudo apt-get -qq -y install g++-11
    #       else        
    #         sudo apt-get -qq -y install gcc-13
    #         sudo apt-get -qq -y install g++-13
    #       fi
    #     elif [[ "${{ inputs.compiler }}" == "clang" ]]; then
    #       if [[ "${{ inputs.version }}" == "min" ]]; then
